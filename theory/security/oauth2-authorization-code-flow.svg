<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1000" height="700" fill="#ffffff"/>
  <text x="500" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">OAuth 2.0 — Authorization Code Flow (with Keycloak)</text>

  <!-- Lane boxes -->
  <g>
    <rect x="15" y="45" width="170" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="100" y="78" text-anchor="middle" font-size="14" fill="#78350f">User (Browser)</text>

    <rect x="295" y="45" width="170" height="55" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="380" y="78" text-anchor="middle" font-size="14" fill="#1e3a8a">Client App</text>

    <rect x="545" y="45" width="170" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="630" y="72" text-anchor="middle" font-size="14" fill="#7f1d1d">Keycloak</text>
    <text x="630" y="88" text-anchor="middle" font-size="11" fill="#7f1d1d">(Authorization Server)</text>

    <rect x="815" y="45" width="170" height="55" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="900" y="72" text-anchor="middle" font-size="14" fill="#064e3b">Resource Server</text>
    <text x="900" y="88" text-anchor="middle" font-size="11" fill="#064e3b">(Microservice)</text>
  </g>

  <!-- Lifelines -->
  <line x1="100" y1="100" x2="100" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="100" x2="380" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="630" y1="100" x2="630" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="900" y1="100" x2="900" y2="650" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Steps -->
  <g font-size="12.5" fill="#1f2937">
    <line x1="100" y1="150" x2="380" y2="150" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="240" y="143" text-anchor="middle">1. Click Login</text>

    <line x1="380" y1="205" x2="630" y2="205" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="505" y="198" text-anchor="middle">2. Redirect (302) to /auth</text>

    <line x1="630" y1="260" x2="100" y2="260" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="365" y="253" text-anchor="middle">3. Show login page</text>

    <line x1="100" y1="315" x2="630" y2="315" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="365" y="308" text-anchor="middle">4. Submit credentials (never seen by Client App)</text>

    <line x1="630" y1="370" x2="380" y2="370" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="505" y="363" text-anchor="middle">5. Redirect back + authorization code</text>

    <line x1="380" y1="425" x2="630" y2="425" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="505" y="418" text-anchor="middle">6. Exchange code + client_secret for tokens</text>

    <line x1="630" y1="480" x2="380" y2="480" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="505" y="473" text-anchor="middle">7. access_token + refresh_token (JWT)</text>

    <line x1="380" y1="535" x2="900" y2="535" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="640" y="528" text-anchor="middle">8. Request, Authorization: Bearer &lt;access_token&gt;</text>

    <line x1="900" y1="590" x2="380" y2="590" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="640" y="583" text-anchor="middle">9. 200 OK + protected data</text>
  </g>
</svg>
