<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>
  <text x="450" y="25" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">JWT Validation in Microservices (stateless, via Keycloak JWKS)</text>

  <!-- Keycloak box -->
  <rect x="310" y="50" width="280" height="72" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#7f1d1d">Keycloak — Authorization Server</text>
  <text x="450" y="90" text-anchor="middle" font-size="11.5" fill="#7f1d1d">issues JWTs, exposes public keys (JWKS)</text>
  <text x="450" y="106" text-anchor="middle" font-size="10.5" fill="#991b1b" font-family="Consolas, monospace">GET /realms/{realm}/protocol/openid-connect/certs</text>

  <!-- Dashed key-fetch arrows -->
  <line x1="155" y1="280" x2="450" y2="122" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>
  <line x1="450" y1="280" x2="450" y2="122" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>
  <line x1="745" y1="280" x2="450" y2="122" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>
  <text x="600" y="185" font-size="11.5" fill="#4b5563">fetch / cache public keys</text>
  <text x="600" y="200" font-size="11.5" fill="#4b5563">(periodic, e.g. every few hours —</text>
  <text x="600" y="215" font-size="11.5" fill="#4b5563">NOT on every request)</text>

  <!-- Service boxes -->
  <rect x="50" y="280" width="210" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="155" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">Service A</text>
  <text x="155" y="335" text-anchor="middle" font-size="11.5" fill="#064e3b">validates JWT locally</text>
  <text x="155" y="352" text-anchor="middle" font-size="11.5" fill="#064e3b">(cached public key)</text>

  <rect x="345" y="280" width="210" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">Service B</text>
  <text x="450" y="335" text-anchor="middle" font-size="11.5" fill="#064e3b">validates JWT locally</text>
  <text x="450" y="352" text-anchor="middle" font-size="11.5" fill="#064e3b">(cached public key)</text>

  <rect x="640" y="280" width="210" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="745" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#064e3b">Service C</text>
  <text x="745" y="335" text-anchor="middle" font-size="11.5" fill="#064e3b">validates JWT locally</text>
  <text x="745" y="352" text-anchor="middle" font-size="11.5" fill="#064e3b">(cached public key)</text>

  <!-- Client box -->
  <rect x="50" y="440" width="210" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="155" y="466" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Client</text>
  <text x="155" y="483" text-anchor="middle" font-size="11.5" fill="#1e3a8a">(holds access_token)</text>

  <!-- Client -> Service A arrow -->
  <line x1="155" y1="440" x2="155" y2="372" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="180" y="410" font-size="11.5" fill="#1f2937">Request</text>
  <text x="180" y="425" font-size="11.5" fill="#1f2937">Authorization: Bearer &lt;token&gt;</text>

  <!-- Note box -->
  <rect x="50" y="540" width="800" height="60" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.3"/>
  <text x="70" y="563" font-size="12.5" font-weight="bold" fill="#111827">Local validation inside each service:</text>
  <text x="70" y="583" font-size="12" fill="#1f2937">✓ verify signature (cached public key)     ✓ check exp / aud / iss     ✗ no per-request call to Keycloak</text>
</svg>
